<html lang="en">
<head>
    <title>Ejemplo Contar Palabras</title>
    <script src="funciones.js"></script>
</head>
<body>
    <textarea id="texto" rows="5" cols="40"></textarea>
    <br>
    <button onclick="procesarTexto()">Contar Palabras</button>
    <p id="resultado"></p>
    <script>
        function procesarTexto() {
            const contenido = document.getElementById("texto").value;
            document.getElementById("resultado").innerText = "cantidad de palabras: " + contarpalabras(contenido);
        }
    </script>
</body>
</html>
